<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#6366f1" />
  <title>日本语同学会</title>
  <link rel="manifest" href="./pwa/manifest.json" />
  <link rel="apple-touch-icon" href="./pwa/icons/icon-192.png" />
  <link rel="stylesheet" href="./style.css?v=2.1" />
</head>
<body>
  <div class="container">
    <!-- ========== 模块选择页面 ========== -->
    <div id="moduleScreen" class="screen">
      <div class="start-hero">
        <div class="lang-switcher">
          <button class="lang-btn active" data-lang="zh-CN">简</button>
          <button class="lang-btn" data-lang="zh-TW">繁</button>
          <button class="lang-btn" data-lang="ja">日</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
        <div class="start-icon">あ</div>
        <h1 data-i18n="title">日本语同学会</h1>
        <p class="start-desc" data-i18n="subtitle">选择练习模块</p>
      </div>

      <div class="module-grid">
        <div class="module-card" data-module="kana">
          <div class="module-icon">あ</div>
          <div class="module-name" data-i18n="mod_kana">50音基础</div>
          <div class="module-desc" data-i18n="mod_kana_desc">清音・浊音・拗音</div>
        </div>
        <div class="module-card" data-module="word">
          <div class="module-icon">言</div>
          <div class="module-name" data-i18n="mod_word">日常短词</div>
          <div class="module-desc" data-i18n="mod_word_desc">常用词汇练习</div>
        </div>
        <div class="module-card" data-module="kanji">
          <div class="module-icon">漢</div>
          <div class="module-name" data-i18n="mod_kanji">汉字短词</div>
          <div class="module-desc" data-i18n="mod_kanji_desc">汉字读写训练</div>
        </div>
        <div class="module-card" data-module="n2">
          <div class="module-icon">JLPT</div>
          <div class="module-name" data-i18n="mod_n2">日本语测试</div>
          <div class="module-desc" data-i18n="mod_n2_desc">N1-N5 真题练习</div>
        </div>
        <div class="module-card" data-module="grammar">
          <div class="module-icon">文法</div>
          <div class="module-name" data-i18n="mod_grammar">语法学习</div>
          <div class="module-desc" data-i18n="mod_grammar_desc">动词分组・句型</div>
        </div>
      </div>

      <div class="start-stats">
        <span class="pill"><span data-i18n="today_label">今日：</span><b id="d_total_start">0</b><span data-i18n="today_unit"> 题</span></span>
        <span class="pill ok"><span data-i18n="correct_label">正确：</span><b id="d_ok_start">0</b></span>
        <span class="pill ng"><span data-i18n="wrong_label">错误：</span><b id="d_ng_start">0</b></span>
        <span class="pill"><span data-i18n="done_label">完成：</span><b id="d_rounds_start">0</b><span data-i18n="rounds_unit"> 轮</span></span>
      </div>

      <div class="start-footer">
        <button class="btn" id="btnResetSettings" data-i18n="reset_settings">复位设置</button>
        <button class="btn" id="btnResetDay" data-i18n="reset_today">重置今日</button>
        <button class="btn danger" id="btnResetAllStats" data-i18n="clear_all">清空全部</button>
      </div>

      <div class="version-tag" id="versionTag"></div>
    </div>

    <!-- ========== 设置页面 ========== -->
    <div id="settingsScreen" class="screen hide">
      <div class="settings-header">
        <button class="btn-back" id="btnBackToModules">&#8592;</button>
        <h2 class="settings-title" id="settingsTitle" data-i18n="mod_kana">50音基础</h2>
      </div>

      <!-- 50音设置 -->
      <section class="card" id="settingsKana">
        <div class="label" data-i18n="mode_type">题型</div>
        <div class="checks" id="modeChecksKana">
          <label class="chk" data-i18n="mode_rm_mc"><input type="checkbox" value="rm_mc" checked> 罗马音→选假名</label>
          <label class="chk" data-i18n="mode_jp_mc"><input type="checkbox" value="jp_mc" checked> 假名→选罗马音</label>
          <label class="chk" data-i18n="mode_rm_in"><input type="checkbox" value="rm_in"> 罗马音输入</label>
          <label class="chk" data-i18n="mode_jp_in"><input type="checkbox" value="jp_in"> 假名输入</label>
        </div>
        <div class="label" style="margin-top:12px" data-i18n="set_label">集合</div>
        <div class="checks" id="kanaSetChecks">
          <label class="chk" data-i18n="set_seion"><input type="checkbox" value="seion" checked> 清音</label>
          <label class="chk" data-i18n="set_dakuon"><input type="checkbox" value="dakuon"> 浊音</label>
          <label class="chk" data-i18n="set_handakuon"><input type="checkbox" value="handakuon"> 半浊音</label>
          <label class="chk" data-i18n="set_yoon"><input type="checkbox" value="yoon"> 拗音</label>
        </div>
      </section>

      <!-- 日常短词设置 -->
      <section class="card" id="settingsWord">
        <div class="label" data-i18n="mode_type">题型</div>
        <div class="checks" id="modeChecksWord">
          <label class="chk" data-i18n="mode_rm_mc"><input type="checkbox" value="rm_mc" checked> 罗马音→选假名</label>
          <label class="chk" data-i18n="mode_jp_mc"><input type="checkbox" value="jp_mc" checked> 假名→选罗马音</label>
          <label class="chk" data-i18n="mode_rm_mean"><input type="checkbox" value="rm_mean"> 读音→选意思</label>
          <label class="chk" data-i18n="mode_mean_rm"><input type="checkbox" value="mean_rm"> 意思→选读音</label>
        </div>
      </section>

      <!-- 汉字短词设置 -->
      <section class="card" id="settingsKanji">
        <div class="label" data-i18n="mode_type">题型</div>
        <div class="checks" id="modeChecksKanji">
          <label class="chk" data-i18n="mode_kanji_read"><input type="checkbox" value="kanji_read" checked> 汉字→选读音</label>
          <label class="chk" data-i18n="mode_read_kanji"><input type="checkbox" value="read_kanji" checked> 读音→选汉字</label>
          <label class="chk" data-i18n="mode_kanji_mean"><input type="checkbox" value="kanji_mean"> 汉字→选意思</label>
        </div>
      </section>

      <!-- N1-N5设置 -->
      <section class="card" id="settingsN2">
        <div class="label" data-i18n="jlpt_level_label">等级</div>
        <div class="checks" id="jlptLevelChecks">
          <label class="chk"><input type="radio" name="jlptLevel" value="n1"> N1</label>
          <label class="chk"><input type="radio" name="jlptLevel" value="n2" checked> N2</label>
          <label class="chk"><input type="radio" name="jlptLevel" value="n3"> N3</label>
          <label class="chk"><input type="radio" name="jlptLevel" value="n4"> N4</label>
          <label class="chk"><input type="radio" name="jlptLevel" value="n5"> N5</label>
        </div>
        <div class="label" style="margin-top:12px" data-i18n="n2_cat_label">题目类型（可多选）</div>
        <div class="checks" id="n2CatChecks">
          <label class="chk" data-i18n="n2_kanji_reading"><input type="checkbox" value="kanji_reading" checked> 漢字読み</label>
          <label class="chk" data-i18n="n2_orthography"><input type="checkbox" value="orthography" checked> 表記</label>
          <label class="chk" data-i18n="n2_context_vocab"><input type="checkbox" value="context_vocab" checked> 文脈規定</label>
          <label class="chk" data-i18n="n2_paraphrase"><input type="checkbox" value="paraphrase" checked> 言い換え</label>
          <label class="chk" data-i18n="n2_usage"><input type="checkbox" value="usage"> 用法</label>
          <label class="chk" data-i18n="n2_grammar"><input type="checkbox" value="grammar" checked> 文法</label>
        </div>
      </section>

      <!-- 通用设置 -->
      <section class="card">
        <div class="grid2">
          <div>
            <div class="label" data-i18n="kana_mode_label">假名模式</div>
            <select id="kanaMode">
              <option value="hira" data-i18n="kana_hira">平假名</option>
              <option value="kata" data-i18n="kana_kata">片假名</option>
            </select>
          </div>
          <div>
            <div class="label" data-i18n="session_size_label">本次题数</div>
            <input type="number" id="sessionSize" value="20" min="5" max="200" />
          </div>
          <div>
            <div class="label" data-i18n="other_options">其他选项</div>
            <label class="chk" data-i18n="hide_meaning"><input type="checkbox" id="hideMeaning"> 隐藏中文释义</label>
            <label class="chk" style="margin-top:8px" data-i18n="content_wrong"><input type="checkbox" id="wrongFirst"> 错题优先</label>
          </div>
        </div>
      </section>

      <!-- 隐藏的合并modeChecks容器 -->
      <div class="hide" id="modeChecks"></div>

      <button class="btn-start" id="btnStartSession" data-i18n="start_btn">开始练习</button>
    </div>

    <!-- ========== 语法主题列表页 ========== -->
    <div id="grammarScreen" class="screen hide">
      <div class="settings-header">
        <button class="btn-back" id="btnGrammarBack">&#8592;</button>
        <h2 class="settings-title" data-i18n="mod_grammar">语法学习</h2>
      </div>

      <div class="grammar-topics" id="grammarTopics">
        <!-- Topics injected by JS -->
      </div>
    </div>

    <!-- ========== 语法主题详情页 ========== -->
    <div id="grammarTopicScreen" class="screen hide">
      <div class="settings-header">
        <button class="btn-back" id="btnGrammarTopicBack">&#8592;</button>
        <h2 class="settings-title" id="grammarTopicTitle">语法</h2>
      </div>
      <button class="btn-start" id="btnGrammarPractice" data-i18n="grammar_practice_btn">开始练习</button>
      <div class="grammar-content" id="grammarContent">
        <!-- Content injected by JS -->
      </div>
    </div>

    <!-- ========== 语法练习页 ========== -->
    <div id="grammarPracticeScreen" class="screen hide">
      <div class="settings-header">
        <button class="btn-back" id="btnGrammarPracticeBack">&#8592;</button>
        <h2 class="settings-title" id="grammarPracticeTitle">练习</h2>
      </div>
      <div class="gp-progress">
        <div class="progress-bar"><div class="progress-fill" id="gpProgressFill"></div></div>
        <div class="gp-stats">
          <span class="stat ok" id="gpOk">0</span>
          <span class="stat ng" id="gpNg">0</span>
          <span class="progress-text"><b id="gpDone">0</b> / <b id="gpTotal">0</b></span>
        </div>
      </div>
      <section class="card quiz-card">
        <div class="gp-hint" id="gpHint"></div>
        <div class="gp-q" id="gpQ"></div>
        <div class="gp-opts" id="gpOpts"></div>
        <div class="result" id="gpResult"></div>
        <div class="quiz-actions">
          <button class="btn primary btn-next" id="btnGpNext">下一题</button>
        </div>
      </section>
    </div>

    <!-- ========== 练习页面 ========== -->
    <div id="quizScreen" class="screen hide">
      <div class="quiz-lang-bar">
        <button class="lang-btn active" data-lang="zh-CN">简</button>
        <button class="lang-btn" data-lang="zh-TW">繁</button>
        <button class="lang-btn" data-lang="ja">日</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
      <header class="quiz-header">
        <div class="quiz-progress">
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <span class="progress-text"><b id="s_done">0</b> / <b id="s_size">20</b></span>
        </div>
        <div class="quiz-stats">
          <span class="stat round" id="s_round">第1轮</span>
          <span class="stat time" id="timer">0:00</span>
          <span class="stat acc" id="s_acc_display">0%</span>
          <span class="stat ok" id="s_ok">0</span>
          <span class="stat ng" id="s_ng">0</span>
          <span class="stat streak" id="streak">0</span>
        </div>
        <button class="btn-back" id="btnBack" data-i18n="btn_back">退出</button>
      </header>

      <section class="card quiz-card">
        <div class="q" id="q">准备开始...</div>
        <div class="meaning muted" id="meaning"></div>

        <div id="opts" class="opts"></div>

        <div id="inputWrap" class="hide">
          <input type="text" id="inp" placeholder="输入答案" autocomplete="off" autocapitalize="off" />
          <button class="btn primary" id="btnCheck" data-i18n="btn_check">提交</button>
          <button class="btn" id="btnShow" data-i18n="btn_show">显示答案</button>
        </div>

        <div class="result" id="result"></div>

        <div class="quiz-actions">
          <button class="btn primary btn-next" id="btnNew" data-i18n="btn_next">下一题</button>
          <button class="btn" id="btnSpeak" data-i18n="btn_speak">播放发音</button>
        </div>
      </section>

      <!-- 隐藏的统计元素 -->
      <div class="hide">
        <span id="d_total"></span>
        <span id="d_ok"></span>
        <span id="d_ng"></span>
        <span id="d_acc"></span>
        <span id="s_acc"></span>
        <span id="tips"></span>
      </div>
    </div>
  </div>

  <script type="module" src="./app.js?v=2.1"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').then((reg) => {
        // Check for updates on load and every 60s
        reg.update();
        setInterval(() => reg.update(), 60000);

        // When a new SW is found, activate and reload
        reg.addEventListener('updatefound', () => {
          const newSW = reg.installing;
          if (!newSW) return;
          newSW.addEventListener('statechange', () => {
            if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
              // New version available — activate immediately
              newSW.postMessage('skipWaiting');
            }
          });
        });

        // Reload once when the controller changes (new SW took over)
        let reloaded = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (reloaded) return;
          reloaded = true;
          location.reload();
        });
      });
    }
  </script>
</body>
</html>
